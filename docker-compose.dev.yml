services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: build
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: sh -c "npm install && npx prisma generate && npm run start:dev"
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
        VITE_APP_VARIANT: ${VITE_APP_VARIANT:-store}
        VITE_ADMIN_URL: ${VITE_ADMIN_URL:-http://localhost:3002/admin}
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
      VITE_APP_VARIANT: ${VITE_APP_VARIANT:-store}
      VITE_ADMIN_URL: ${VITE_ADMIN_URL:-http://localhost:3002/admin}
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 80"
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
